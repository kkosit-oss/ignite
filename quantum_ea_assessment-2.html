        function toggleLang() {
            currentLang = currentLang === 'th' ? 'en' : 'th';

            if (document.getElementById('welcome-screen')) {
                renderWelcome();
            } else if (document.getElementById('question-screen')) {
                renderQuestion();
            } else if (document.getElementById('results-screen')) {
                renderResults();
            }
        }

        function transitionContent(htmlContent, callback = null) {
            const container = document.getElementById('app-content');
            container.classList.remove('show');
            container.classList.add('hide');
            
            setTimeout(() => {
                container.innerHTML = htmlContent;
                container.classList.remove('hide');
                container.classList.add('show');
                if (callback) {
                    // Wait for DOM to paint before executing callback (crucial for Chart.js)
                    requestAnimationFrame(() => {
                        callback();
                    });
                }
            }, 300); // matches CSS transition
        }

        function renderWelcome() {
            scores = { dim1: 0, dim2: 0, dim3: 0, dim4: 0 };
            currentQuestion = 0;
            const t = translations[currentLang];
            
            const html = `
                <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center mt-12">
                    <div class="w-24 h-24 bg-brand-50 rounded-full flex items-center justify-center mb-6 shadow-inner">
                        <svg class="w-12 h-12 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-4">${t.welcomeTitle}</h2>
                    <p class="text-slate-600 mb-10 text-sm leading-relaxed max-w-[280px] mx-auto">${t.welcomeDesc}</p>
                    <button onclick="renderQuestion()" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-semibold py-4 rounded-xl shadow-lg shadow-brand-500/30 transition transform hover:scale-[1.02] active:scale-95">
                        ${t.startBtn}
                    </button>
                </div>
            `;
            transitionContent(html);
        }

        function renderQuestion() {
            const t = translations[currentLang];
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;

            const optionsHtml = q.options.map((opt, idx) => `
                <button onclick="answerQuestion(${opt.val}, '${q.dim}')" class="w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-brand-500 hover:bg-brand-50 focus:border-brand-500 transition-all duration-200 text-sm text-slate-700 shadow-sm mb-3">
                    ${opt[currentLang]}
                </button>
            `).join('');

            const html = `
                <div id="question-screen" class="flex flex-col h-full mt-4">
                    <div class="w-full bg-slate-100 h-2 rounded-full mb-6 overflow-hidden">
                        <div class="bg-brand-500 h-full transition-all duration-500" style="width: ${progress}%"></div>
                    </div>
                    
                    <span class="text-xs font-bold text-brand-500 tracking-wider uppercase mb-2">${t.qPrefix} ${currentQuestion + 1} / ${questions.length}</span>
                    <h2 class="text-lg font-bold text-slate-800 mb-8 leading-relaxed">${q[currentLang]}</h2>
                    
                    <div class="flex-1">
                        ${optionsHtml}
                    </div>
                </div>
            `;
            transitionContent(html);
        }

        function answerQuestion(val, dim) {
            scores[dim] += val;
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                renderQuestion();
            } else {
                renderResults();
            }
        }

        function getCoachingFeedback(percentage, currentLang) {
            if (percentage < 50) {
                return currentLang === 'th' ? 
                    { 
                        level: "แบบเดิม (Traditional EA)", 
                        desc: "กระบวนทัศน์การทำงานของคุณยังมุ่งเน้นที่การปฏิบัติตามคำสั่ง (Directive-driven) และการแก้ปัญหาแบบเส้นตรง (Linear Execution) ซึ่งอาจก่อให้เกิดคอขวด (Bottleneck) ในสภาวะที่องค์กรยุคใหม่ต้องการความคล่องตัวและการตอบสนองอย่างฉับพลัน",
                        gap: "ขาดการประเมินภาพรวมเชิงระบบ (Systemic Thinking) และยังไม่ได้ดึงศักยภาพของเทคโนโลยีขั้นสูงมาใช้เพื่อลดภาระงานเชิงธุรการ ทำให้สูญเสียทุนทางเวลาไปกับงานที่ไม่ได้สร้างมูลค่าเพิ่ม (Non-value added tasks)",
                        courses: [
                            "Foundations of Strategic Thinking & Prioritization",
                            "AI Tools for Daily Productivity (ChatGPT/Gemini Basics)",
                            "Proactive Communication & Stakeholder Management"
                        ]
                    } : 
                    { 
                        level: "Traditional EA", 
                        desc: "Your paradigm focuses heavily on directive-driven, linear execution. In a modern, fast-paced corporate ecosystem, this approach can inadvertently create bottlenecks during complex situations.",
                        gap: "There is a need to develop systemic thinking. Currently, valuable time is being absorbed by non-value-added transactional tasks because modern tech-augmentation is not fully utilized.",
                        courses: [
                            "Foundations of Strategic Thinking & Prioritization",
                            "AI Tools for Daily Productivity (ChatGPT/Gemini Basics)",
                            "Proactive Communication & Stakeholder Management"
                        ]
                    };
            } else if (percentage < 80) {
                return currentLang === 'th' ? 
                    { 
                        level: "กำลังเปลี่ยนผ่าน (Transitioning EA)", 
                        desc: "คุณมีความสามารถในการนำเครื่องมือดิจิทัลมาประยุกต์ใช้และปรับตัวต่อความเปลี่ยนแปลงได้ดีในระดับปฏิบัติการ อย่างไรก็ตาม ยังจำเป็นต้องเพิ่มมิติการคิดเชิงรุกเพื่อเชื่อมโยงผลลัพธ์ของงานเข้ากับยุทธศาสตร์องค์กร",
                        gap: "เพื่อยกระดับจากการเป็นผู้ประสานงานชั้นยอด สู่การเป็น 'พันธมิตรเชิงกลยุทธ์' คุณต้องฝึกฝนการคาดการณ์ปัญหาล่วงหน้า (Forecasting) และการบริหารจัดการความคลุมเครือ (Navigating Ambiguity) ด้วยความมั่นใจ",
                        courses: [
                            "Prompt Engineering for Business Administration",
                            "Design Thinking & Problem Solving for Executive Support",
                            "Advanced Scenario Planning & Agility"
                        ]
                    } : 
                    { 
                        level: "Transitioning EA", 
                        desc: "You demonstrate a strong capability in utilizing digital tools and adapting to operational changes. However, there is room to elevate your proactive, macro-level strategic integration.",
                        gap: "To transition from a high-performing coordinator to a true 'Strategic Partner', you need to enhance your forecasting abilities and confidence in navigating high-ambiguity environments.",
                        courses: [
                            "Prompt Engineering for Business Administration",
                            "Design Thinking & Problem Solving for Executive Support",
                            "Advanced Scenario Planning & Agility"
                        ]
                    };
            } else {
                return currentLang === 'th' ? 
                    { 
                        level: "ระดับควอนตัม (Quantum Zone)", 
                        desc: "คุณแสดงสมรรถนะในระดับ 'พันธมิตรเชิงกลยุทธ์' (Strategic Partner) อย่างเต็มรูปแบบ มีความเชี่ยวชาญในการใช้เทคโนโลยีขั้นสูงเพื่อทุ่นแรง มีวิสัยทัศน์กว้างไกล และช่วยปกป้องทุนทางความคิด (Cognitive Bandwidth) ของผู้บริหารได้อย่างเป็นรูปธรรม",
                        gap: "ความท้าทายในระดับนี้คือการรักษาสมรรถนะสูงสุดท่ามกลางเทคโนโลยีที่เปลี่ยนแปลงอย่างก้าวกระโดด รวมถึงการสถาปนาตนเองเป็นผู้นำทางความคิด (Thought Leader) เพื่อถ่ายทอดขีดความสามารถนี้ให้แก่ทีมงานองค์รวม",
                        courses: [
                            "Advanced AI Agent Orchestration & Automation",
                            "Executive Presence, Diplomacy & Influence",
                            "Leadership, Coaching & Organizational Change Management"
                        ]
                    } : 
                    { 
                        level: "Quantum Zone", 
                        desc: "You operate entirely as a 'Strategic Partner'. You excel at leveraging advanced tech-augmentation, demonstrating deep agility, and tangibly protecting the executive's cognitive bandwidth.",
                        gap: "The challenge at this elite level is maintaining peak performance amidst exponential technological shifts, and establishing yourself as a thought leader to mentor the broader organizational team.",
                        courses: [
                            "Advanced AI Agent Orchestration & Automation",
                            "Executive Presence, Diplomacy & Influence",
                            "Leadership, Coaching & Organizational Change Management"
                        ]
                    };
            }
        }

        function renderResults() {
            const t = translations[currentLang];
            
            // Calculate Percentages (Max scores defined in comment above)
            const p1 = Math.round((scores.dim1 / 30) * 100);
            const p2 = Math.round((scores.dim2 / 20) * 100);
            const p3 = Math.round((scores.dim3 / 30) * 100);
            const p4 = Math.round((scores.dim4 / 20) * 100);

            // Calculate Pillars based on mapped logic
            const workMastery = Math.round((p1 + p3) / 2); // Parallel + Agility
            const techMastery = Math.round((p3 + p2) / 2); // Agility + Tech
            const peopleMastery = p4; // Bridge

            // Determine overall coaching
            const overallScore = Math.round((workMastery + techMastery + peopleMastery) / 3);
            const coaching = getCoachingFeedback(overallScore, currentLang);

            const html = `
                <div id="results-screen" class="flex flex-col pb-6 pt-2">
                    <div class="text-center mb-6">
                        <h2 class="text-2xl font-bold text-slate-800">${t.resultsTitle}</h2>
                        <p class="text-sm text-slate-500 mt-1">${t.resultsDesc}</p>
                    </div>

                    <!-- Radar Chart Container with fixed height to prevent collapsing -->
                    <div class="w-full h-[280px] bg-white rounded-2xl shadow-sm border border-slate-100 p-2 mb-6 flex-shrink-0">
                        <canvas id="radarChart"></canvas>
                    </div>

                    <!-- 3 Pillars Analytics -->
                    <div class="grid grid-cols-3 gap-2 mb-8">
                        <div class="bg-brand-50 p-3 rounded-xl text-center border border-brand-100">
                            <span class="block text-2xl font-bold text-brand-600 mb-1">${workMastery}%</span>
                            <span class="text-[10px] sm:text-xs font-medium text-slate-600 leading-tight block">${t.pillar1}</span>
                        </div>
                        <div class="bg-blue-50 p-3 rounded-xl text-center border border-blue-100">
                            <span class="block text-2xl font-bold text-blue-600 mb-1">${techMastery}%</span>
                            <span class="text-[10px] sm:text-xs font-medium text-slate-600 leading-tight block">${t.pillar2}</span>
                        </div>
                        <div class="bg-indigo-50 p-3 rounded-xl text-center border border-indigo-100">
                            <span class="block text-2xl font-bold text-indigo-600 mb-1">${peopleMastery}%</span>
                            <span class="text-[10px] sm:text-xs font-medium text-slate-600 leading-tight block">${t.pillar3}</span>
                        </div>
                    </div>

                    <!-- Coaching Window -->
                    <div class="bg-slate-800 rounded-2xl p-5 text-white mb-8 shadow-md">
                        <div class="flex items-center gap-2 mb-4 text-brand-400">
                            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            <h3 class="font-bold text-sm uppercase tracking-wide">${t.coachingTitle}</h3>
                        </div>
                        
                        <div class="mb-5 border-b border-slate-700 pb-4">
                            <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">${t.currentState}</h4>
                            <p class="font-bold text-xl mb-2 text-white">${coaching.level}</p>
                            <p class="text-slate-300 text-sm leading-relaxed">${coaching.desc}</p>
                        </div>

                        <div class="mb-5">
                            <h4 class="text-[10px] font-bold text-brand-300 uppercase tracking-wider mb-2">${t.gapAnalysis}</h4>
                            <div class="bg-slate-700/50 border border-slate-600 rounded-xl p-3">
                                <p class="text-brand-50 text-sm leading-relaxed">${coaching.gap}</p>
                            </div>
                        </div>

                        <div>
                            <h4 class="text-[10px] font-bold text-emerald-400 uppercase tracking-wider mb-3">${t.recommendedCourses}</h4>
                            <ul class="space-y-3">
                                ${coaching.courses.map(course => `
                                    <li class="flex items-start gap-2 bg-slate-900/50 p-2 rounded-lg border border-slate-700/50">
                                        <span class="text-emerald-500 mt-0.5 flex-shrink-0">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        </span>
                                        <span class="text-xs font-medium text-slate-200 leading-snug">${course}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    </div>

                    <button onclick="renderWelcome()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-4 rounded-xl transition mt-auto">
                        ${t.retakeBtn}
                    </button>
                </div>
            `;
            
            // Pass the initChart function as a callback so it fires ONLY AFTER HTML is in the DOM
            transitionContent(html, () => {
                initChart([p1, p2, p3, p4], t);
            });
        }

        function initChart(dataArray, tUI) {
            const ctx = document.getElementById('radarChart');
            if (!ctx) return;

            if (radarChartInstance) {
                radarChartInstance.destroy();
            }

            // Wrap long labels to multiple lines for a better mobile layout
            const formatLabel = (text) => {
                if (text && text.includes(' (')) {
                    const parts = text.split(' (');
                    return [parts[0], '(' + parts[1]];
                }
                return text;
            };

            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: [formatLabel(tUI.dim1), formatLabel(tUI.dim2), formatLabel(tUI.dim3), formatLabel(tUI.dim4)],
                    datasets: [{
                        label: 'Score',
                        data: dataArray,
                        backgroundColor: 'rgba(20, 184, 166, 0.2)', // Teal-500 with opacity
                        borderColor: 'rgba(20, 184, 166, 1)',
                        pointBackgroundColor: 'rgba(20, 184, 166, 1)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgba(20, 184, 166, 1)',
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            // CRITICAL FIX: Lock the scale to 0-100 accurately
                            min: 0,
                            max: 100,
                            beginAtZero: true,
                            angleLines: { color: 'rgba(0,0,0,0.05)' },
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            pointLabels: {
                                font: {
                                    family: "'Inter', 'Prompt', sans-serif",
                                    size: 10,
                                    weight: '600'
                                },
                                color: '#475569' // slate-600
                            },
                            ticks: {
                                display: false, // Hide numeric axis scale for clean UI
                                stepSize: 20
                            }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.raw.toFixed(0) + '%';
                                }
                            }
                        }
                    }
                }
            });
        }

        // Boot the app
        renderWelcome();

    </script>
</body>
</html>
